name: Build

on:
  pull_request:
  push:
    branches:
      - main
      - work

permissions:
  contents: read

jobs:
  api:
    name: Go API checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/api/go.mod
          cache-dependency-path: services/api/go.mod

      - name: Format check
        run: test -z "$(gofmt -l services/api)"

      - name: Vet
        run: go vet ./services/api/...

      - name: Test
        run: go test ./services/api/...

      - name: Race test
        run: go test -race ./services/api/...

      - name: Validate OpenAPI JSON
        run: python3 -m json.tool packages/api-contract/openapi/storage-admin.v1.json >/tmp/storage-admin-openapi.json

      - name: Docker build smoke test
        run: docker build --build-arg VERSION=ci --build-arg COMMIT=${{ github.sha }} --build-arg BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ) -t inori-music-api:ci .

  web:
    name: Web checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate API types
        run: npm run generate:api

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080

  admin:
    name: Admin checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate API types
        run: npm run generate:api

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
