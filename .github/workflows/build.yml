name: Build

on:
  pull_request:
  push:
    branches:
      - main
      - work

permissions:
  contents: read

jobs:
  api:
    name: Go API checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/api/go.mod
          cache-dependency-path: services/api/go.mod

      - name: Format check
        run: test -z "$(gofmt -l services/api)"

      - name: Vet
        run: go vet ./services/api/...

      - name: Test
        run: go test ./services/api/...

      - name: Race test
        run: go test -race ./services/api/...

      - name: Validate OpenAPI JSON
        run: python3 -m json.tool packages/api-contract/openapi/storage-admin.v1.json >/tmp/storage-admin-openapi.json

      - name: Docker build smoke test
        run: docker build --build-arg VERSION=ci --build-arg COMMIT=${{ github.sha }} --build-arg BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ) -t inori-music-api:ci .

  web:
    name: Web checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate API types
        run: npm run generate:api

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080

  e2e:
    name: Web E2E smoke tests
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Go API (in-memory, no postgres required) ──────────────────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/api/go.mod
          cache-dependency-path: services/api/go.mod

      - name: Start API server
        run: |
          go run ./services/api/cmd/server/main.go &
          echo $! > /tmp/api.pid
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/healthz && break || sleep 1
          done
        env:
          INORI_HTTP_ADDR: "0.0.0.0:8080"
          INORI_ADMIN_TOKEN: "ci-admin-token"
          INORI_INITIAL_ADMIN_USER: "ci-viewer"
          INORI_INITIAL_ADMIN_PASSWORD: "ci-password-123"

      # ── Next.js web dev server (port 3000) ────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/web/package-lock.json

      - name: Install web dependencies
        working-directory: services/web
        run: npm ci

      - name: Generate API types
        working-directory: services/web
        run: npm run generate:api

      - name: Start web dev server
        working-directory: services/web
        run: |
          npm run dev &
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000 && break || sleep 1
          done
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080

      # ── Playwright ────────────────────────────────────────────────────
      - name: Install Playwright browsers
        working-directory: services/web
        run: npx playwright install chromium --with-deps

      - name: Run E2E smoke tests
        working-directory: services/web
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_USERNAME: "ci-viewer"
          E2E_PASSWORD: "ci-password-123"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: services/web/playwright-report/
          retention-days: 7

  admin:
    name: Admin checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate API types
        run: npm run generate:api

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
