name: Build

on:
  pull_request:
  push:
    branches:
      - main
      - work

permissions:
  contents: read

jobs:
  api:
    name: Go API checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/api/go.mod
          cache-dependency-path: services/api/go.mod

      - name: Format check
        run: test -z "$(gofmt -l services/api)"

      - name: Vet
        run: go vet ./services/api/...

      - name: Test
        run: go test ./services/api/...

      - name: Race test
        run: go test -race ./services/api/...

      - name: Validate OpenAPI JSON
        run: python3 -m json.tool packages/api-contract/openapi/storage-admin.v1.json >/tmp/storage-admin-openapi.json

      - name: Docker build smoke test
        run: docker build -t inori-music-api:ci .
