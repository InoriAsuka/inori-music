# syntax=docker/dockerfile:1
# docker-compose.prod.yml — production stack
#
# Environment variables (set in .env):
#   INORI_ADMIN_TOKEN       — static bootstrap admin token
#   INORI_AUTH_SECRET       — JWT signing secret
#   POSTGRES_PASSWORD       — PostgreSQL password

name: inori-music

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: inori
      POSTGRES_USER: inori
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inori"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Go REST API ─────────────────────────────────────────────────────────
  api:
    image: ghcr.io/inoriasuka/inori-music/api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      INORI_HTTP_ADDR: "0.0.0.0:8080"
      INORI_DB_DSN: "postgres://inori:${POSTGRES_PASSWORD}@postgres:5432/inori?sslmode=disable"
      INORI_ADMIN_TOKEN: "${INORI_ADMIN_TOKEN:?INORI_ADMIN_TOKEN required}"
      INORI_AUTH_SECRET: "${INORI_AUTH_SECRET:?INORI_AUTH_SECRET required}"
      INORI_STREAM_SIGNING_KEY: "${INORI_STREAM_SIGNING_KEY:?INORI_STREAM_SIGNING_KEY required}"
      INORI_STORAGE_REPOSITORY_FILE: "/data/storage-backends.json"
      INORI_MEDIA_OBJECT_REPOSITORY_FILE: "/data/media-objects.json"
    volumes:
      - api_data:/data
      # Mount media directories for local/NFS backends (read-only)
      # - /mnt/music:/mnt/music:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Web player (Next.js, :3000) ─────────────────────────────────────────
  web:
    image: ghcr.io/inoriasuka/inori-music/web:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://api:8080"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── Admin console (Next.js, :3001) ──────────────────────────────────────
  admin:
    image: ghcr.io/inoriasuka/inori-music/admin:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://api:8080"
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/admin/login"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── Meilisearch (:7700) ─────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:latest
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILI_SEARCH_KEY:?MEILI_SEARCH_KEY required}
      - MEILI_ENV=production
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

  # ── Nginx gateway (:80) ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      web:
        condition: service_healthy
      admin:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      # TLS certificates — mount from host or use certbot sidecar
      # - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  postgres_data:
  api_data:
  meilisearch_data:
