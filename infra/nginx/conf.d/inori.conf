# Upstream pools
upstream inori_api   { server api:8080;   keepalive 32; }
upstream inori_web   { server web:3000;   keepalive 16; }
upstream inori_admin { server admin:3001; keepalive 16; }

# ── Common proxy headers macro ────────────────────────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # ── Go REST API ─────────────────────────────────────────────────────
    location ~ ^/(api/v1|healthz|readyz|versionz|metrics) {
        proxy_pass         http://inori_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Audio streaming: disable buffering so Range responses stream cleanly
        proxy_buffering    off;
        proxy_request_buffering off;
    }

    # ── Admin console (/admin and /admin/*) ────────────────────────────
    location ~ ^/admin(/.*)?$ {
        # Next.js expects the full path including /admin prefix
        proxy_pass         http://inori_admin;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (Next.js HMR in dev; SSE in prod)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    # ── Next.js static assets (admin) ────────────────────────────────
    location ~ ^/admin/_next/ {
        proxy_pass         http://inori_admin;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            7d;
        add_header         Cache-Control "public, immutable";
    }

    # ── Web player (catch-all) ────────────────────────────────────────
    location / {
        proxy_pass         http://inori_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    # ── Next.js static assets (web) ──────────────────────────────────
    location /_next/static/ {
        proxy_pass http://inori_web;
        expires    7d;
        add_header Cache-Control "public, immutable";
    }
}
