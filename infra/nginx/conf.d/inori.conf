# Upstream pools
upstream inori_api   { server api:8080;   keepalive 32; }
upstream inori_web   { server web:3000;   keepalive 16; }
upstream inori_admin { server admin:3001; keepalive 16; }

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # ── Go REST API ─────────────────────────────────────────────────────
    location ~ ^/(api/v1|healthz|readyz|versionz|metrics) {
        proxy_pass         http://inori_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_request_buffering off;
    }

    # ── Admin console (/admin and /admin/*) ─────────────────────────────
    # services/admin uses Next.js basePath=/admin, so the prefix is preserved.
    location /admin/ {
        proxy_pass         http://inori_admin;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    location = /admin {
        return 308 /admin/;
    }

    # ── Web player (catch-all) ───────────────────────────────────────────
    location / {
        proxy_pass         http://inori_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }

    location /_next/static/ {
        proxy_pass http://inori_web;
        expires    7d;
        add_header Cache-Control "public, immutable";
    }
}
